name: mobile
description: Flutter mobile app with Firebase Google Sign-In
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.2.0

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Code editor
  flutter_code_editor: ^0.3.2
  highlight: ^0.7.0
  flutter_highlight: ^0.7.0

  # HTTP
  http: ^1.2.2

  # UI
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Charts
  fl_chart: ^0.69.0

  # Local storage
  shared_preferences: ^2.3.2

  # Image caching
  cached_network_image: ^3.4.1

  # Animations
  lottie: ^3.1.2

  # Progress indicators
  percent_indicator: ^4.2.3

  # Date formatting
  intl: ^0.19.0

  # Confetti animation
  confetti: ^0.7.0

  # Shimmer loading
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
